<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Tech & Software Engineering Portal</title>

body {
  /* High-quality dark tech image background with a deep tint overlay for high text legibility */
  background: 
    linear-gradient(rgba(8, 11, 16, 0.88), rgba(8, 11, 16, 0.94)),
    url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
  background-size: cover;
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  color: white;
  min-height: 100vh;
}

h2 {
  margin-bottom: 50px;
}

/* ===== HEADING ===== */
.title {
  font-size: 60px;
  font-weight: 800;
  letter-spacing: 3px;
  margin-top: 60px;
  line-height: 1.2;
}

.hover-word {
  color: white;
  transition: 0.3s;
  cursor: pointer;
  margin: 0 10px;
  display: inline-block;
}

.hover-word:hover {
  color: cyan;
  text-shadow: 0 0 15px cyan;
  transform: translateY(-2px);
}

.amp {
  color: #8b5cf6;
  font-size: 60px;
  margin: 10px 0;
  display: inline-block;
}

/* ===== PROFILE SECTION ===== */
.profile-title {
  font-size: 35px;
  margin-top: 100px;
  font-weight: 600;
}

.underline {
  width: 120px;
  height: 4px;
  background-color: #8b5cf6;
  margin: 10px auto 40px;
  border-radius: 5px;
}

/* Card - Modern glassmorphism look to blend with image background */
.card {
  width: 85%;
  max-width: 550px;
  margin: 20px auto 80px; 
  background-color: rgba(15, 23, 42, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 20px;
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.card:hover {
  transform: scale(1.02) translateY(-5px);
  box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
  border-color: cyan;
}

/* Rows */
.row {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 14px 10px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  transition: 0.2s;
}

.row:last-child {
  border-bottom: none;
}

.label {
  width: 140px;
  font-weight: bold;
  font-size: 14px;
  text-align: left;
  color: #94a3b8;
  letter-spacing: 0.5px;
}

.value {
  font-size: 14px;
  color: #a5b4fc;
  text-align: left;
  font-weight: 600;
}

.row:hover {
  background-color: rgba(255, 255, 255, 0.04);
  border-radius: 8px;
}

/* ===== COURSE SECTION ===== */
.course-title {
  font-size: 35px;
  margin-top: 40px;
  font-weight: 600;
}

.course-container {

  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  padding: 0 20px 60px;
}
